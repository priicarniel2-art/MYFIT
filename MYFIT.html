<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYFIT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8f04a;
    --text: #f0f0f0;
    --muted: #777;
    --danger: #ff4444;
    --success: #4adf8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo span { color: var(--text); }

  .date-badge {
    font-size: 12px;
    color: var(--muted);
    background: var(--card);
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .nav-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 1;
    min-width: 70px;
    padding: 14px 8px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
  .page.active { display: block; }

  /* TREINO SELECTOR */
  .treino-selector {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .treino-sel-btn {
    padding: 12px 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .treino-sel-btn .sel-key {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 20px;
    display: block;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2px;
  }
  .treino-sel-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
  .treino-sel-btn.active .sel-key { color: var(--accent); }

  /* WORKOUT HEADER */
  .workout-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .workout-tag {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 40px;
    color: var(--accent);
    line-height: 1;
  }
  .workout-info h2 { font-size: 18px; font-weight: 600; }
  .workout-info p { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* EXERCISE CARD */
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .exercise-card.completed { border-color: var(--success); }

  .exercise-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .ex-number {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 24px;
    color: var(--accent);
    min-width: 28px;
    line-height: 1;
  }
  .ex-info { flex: 1; }
  .ex-name { font-size: 15px; font-weight: 600; }
  .ex-muscles { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .ex-meta { text-align: right; font-size: 12px; color: var(--muted); }
  .ex-meta strong { display: block; font-size: 14px; color: var(--text); font-weight: 600; }

  .ex-check {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .exercise-card.completed .ex-check {
    background: var(--success);
    border-color: var(--success);
    color: #000;
  }

  .exercise-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
  .exercise-body.open { display: block; }

  .sets-header {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 44px;
    gap: 8px;
    padding: 10px 0 6px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .set-row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 44px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .set-num {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 20px;
    color: var(--muted);
  }

  .set-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 14px;
    font-weight: 500;
    width: 100%;
    text-align: center;
    transition: border-color 0.2s;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--muted); }

  .set-done-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
    text-align: center;
    width: 100%;
  }
  .set-done-btn.done { background: var(--accent); border-color: var(--accent); color: #000; }

  .notes-area { margin-top: 12px; }
  .notes-area textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 13px;
    width: 100%;
    resize: none;
    height: 56px;
    transition: border-color 0.2s;
  }
  .notes-area textarea:focus { outline: none; border-color: var(--accent); }
  .notes-area textarea::placeholder { color: var(--muted); }

  .btn-complete-ex {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--success);
    background: none;
    color: var(--success);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-complete-ex.reopen { border-color: var(--danger); color: var(--danger); }

  /* CARDIO */
  .cardio-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .cardio-card h3 {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 22px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .cardio-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }
  .cardio-label { font-size: 13px; color: var(--muted); min-width: 80px; }
  .cardio-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Sans', Arial, sans-serif;
    font-size: 14px;
    transition: border-color 0.2s;
  }
  .cardio-input:focus { outline: none; border-color: var(--accent); }
  .cardio-input::placeholder { color: var(--muted); }

  /* SAVE BUTTON */
  .btn-save {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-save:active { transform: translateY(0); }

  /* HISTORICO */
  .history-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .history-date { font-size: 12px; color: var(--muted); }
  .history-tag { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 20px; color: var(--accent); }
  .history-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; padding: 2px 6px;
    border-radius: 6px; transition: all 0.2s;
  }
  .history-del:hover { background: var(--danger); color: #fff; }
  .history-exercises { display: flex; flex-wrap: wrap; gap: 6px; }
  .history-ex-tag {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--muted);
  }
  .history-stats {
    display: flex; gap: 16px; margin-top: 12px;
    padding-top: 12px; border-top: 1px solid var(--border);
  }
  .history-stat { font-size: 12px; color: var(--muted); }
  .history-stat strong { color: var(--text); font-weight: 600; display: block; font-size: 14px; }

  /* STATS */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
  }
  .stat-card .stat-value {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 36px; color: var(--accent); line-height: 1;
  }
  .stat-card .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* CALENDAR */
  .calendar-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 20px;
  }
  .calendar-nav {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 14px;
  }
  .calendar-nav button {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px;
    width: 32px; height: 32px; cursor: pointer; transition: all 0.2s;
  }
  .calendar-nav button:hover { border-color: var(--accent); color: var(--accent); }
  .calendar-month-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 20px; letter-spacing: 1px;
  }
  .calendar-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .cal-day-label {
    text-align: center; font-size: 10px; color: var(--muted);
    padding: 4px 0 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .cal-day {
    aspect-ratio: 1; border-radius: 8px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted); cursor: default;
  }
  .cal-day.today { border: 1px solid var(--accent); color: var(--accent); font-weight: 700; }
  .cal-day.trained { background: var(--accent); color: #000; font-weight: 700; cursor: pointer; }
  .cal-day.trained:hover { opacity: 0.85; }
  .cal-day.cardio-day { background: #1a6b8a; color: #fff; font-weight: 700; cursor: pointer; }
  .cal-day .cal-tag { font-size: 8px; font-weight: 700; line-height: 1; margin-top: 1px; }
  .cal-day.empty { opacity: 0; pointer-events: none; }

  .cal-detail {
    margin-top: 14px; border-top: 1px solid var(--border);
    padding-top: 14px; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .cal-detail-date { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
  .cal-detail-treino { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .cal-detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cal-detail-key { font-family: 'Bebas Neue', Impact, sans-serif; font-size: 22px; color: var(--accent); line-height: 1; }
  .cal-detail-nome { font-size: 13px; font-weight: 600; }
  .cal-detail-ex { font-size: 12px; color: var(--muted); padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .cal-detail-ex:last-child { border-bottom: none; }
  .cal-detail-peso { font-size: 11px; color: var(--text); font-weight: 600; }

  .page-title {
    font-family: 'Bebas Neue', Impact, sans-serif;
    font-size: 28px; letter-spacing: 1px; margin-bottom: 16px;
  }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--muted); margin-bottom: 10px; margin-top: 20px;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--success); color: #000;
    padding: 12px 24px; border-radius: 30px;
    font-weight: 600; font-size: 14px;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 300;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">MY<span>FIT</span></div>
  <div class="date-badge" id="headerDate"></div>
</header>

<div class="nav-tabs">
  <button class="tab-btn active" onclick="showPage('treino')">🏋️ Treino</button>
  <button class="tab-btn" onclick="showPage('stats')">📊 Stats</button>
</div>

<!-- TREINO PAGE -->
<div id="page-treino" class="page active">
  <div class="treino-selector">
    <button class="treino-sel-btn active" id="btnA" onclick="selectTreino('A')"><span class="sel-key">A</span>Ombros<br>Costas</button>
    <button class="treino-sel-btn" id="btnB" onclick="selectTreino('B')"><span class="sel-key">B</span>Posterior<br>Força</button>
    <button class="treino-sel-btn" id="btnC" onclick="selectTreino('C')"><span class="sel-key">C</span>Costas<br>Braços</button>
    <button class="treino-sel-btn" id="btnD" onclick="selectTreino('D')"><span class="sel-key">D</span>Lateral<br>Volume</button>
    <button class="treino-sel-btn" id="btnCardio" onclick="selectTreino('Cardio')"><span class="sel-key">🏃</span>Cardio</button>
  </div>
  <div id="treinoContent"></div>
</div>

<!-- STATS PAGE -->
<div id="page-stats" class="page">
  <div class="page-title">Estatísticas</div>
  <div class="section-label">Calendário</div>
  <div class="calendar-card" id="calendarCard"></div>
  <div class="section-label">Geral</div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="section-label">Treinos por tipo</div>
  <div id="tipoStats"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TREINOS = {
  A: {
    nome: "Ombros & Costas",
    descricao: "Deltóide · Latíssimo · Trapézio",
    emoji: "💪",
    exercicios: [
      { nome: "Desenvolvimento com Halteres", musculos: "Deltóide anterior e medial, tríceps", series: 3, reps: "10–12" },
      { nome: "Elevação Lateral com Halteres", musculos: "Deltóide medial, trapézio superior", series: 3, reps: "12–15" },
      { nome: "Puxada Frontal na Polia", musculos: "Latíssimo, bíceps, romboides", series: 3, reps: "10–12" },
      { nome: "Remada Alta com Halteres", musculos: "Trapézio, deltóide medial, bíceps", series: 3, reps: "10–12" },
    ]
  },
  B: {
    nome: "Posterior & Força",
    descricao: "Glúteo · Isquiotibiais · Posterior",
    emoji: "🍑",
    exercicios: [
      { nome: "Cadeira Abdutora", musculos: "Glúteo médio e mínimo, tensor da fáscia lata", series: 3, reps: "15–20" },
      { nome: "Elevação Pélvica (Hip Thrust)", musculos: "Glúteo máximo, isquiotibiais, core", series: 3, reps: "10–15" },
      { nome: "Stiff com Halteres", musculos: "Isquiotibiais, glúteo máximo, lombar", series: 3, reps: "10–12" },
      { nome: "Coice na Polia", musculos: "Glúteo máximo, isquiotibiais", series: 3, reps: "15–20 cada" },
    ]
  },
  C: {
    nome: "Costas & Braços",
    descricao: "Latíssimo · Bíceps · Tríceps",
    emoji: "💪",
    exercicios: [
      { nome: "Remada Curvada com Barra", musculos: "Latíssimo, romboides, trapézio médio, bíceps", series: 3, reps: "10–12" },
      { nome: "Crucifixo Inverso com Halteres", musculos: "Deltóide posterior, romboides, trapézio", series: 3, reps: "12–15" },
      { nome: "Rosca Direta Barra W", musculos: "Bíceps braquial, braquiorradial", series: 3, reps: "10–12" },
      { nome: "Tríceps Francês com Haltere", musculos: "Tríceps braquial (todas as cabeças)", series: 3, reps: "10–12" },
    ]
  },
  D: {
    nome: "Lateral & Volume",
    descricao: "Glúteo · Quadríceps · Adutores",
    emoji: "🍑",
    exercicios: [
      { nome: "Agachamento Sumô", musculos: "Glúteo máximo, adutores, quadríceps", series: 3, reps: "10–12" },
      { nome: "Agachamento Búlgaro", musculos: "Glúteo máximo, quadríceps, isquiotibiais", series: 3, reps: "10–12 cada" },
      { nome: "Abdução na Polia Baixa", musculos: "Glúteo médio e mínimo, tensor da fáscia lata", series: 3, reps: "15–20 cada" },
      { nome: "Afundo com Halteres", musculos: "Glúteo máximo, quadríceps, isquiotibiais", series: 3, reps: "10–12 cada" },
    ]
  }
};

let currentTreino = 'A';
let sessionState = {};
let cardioState = { tipo: '', duracao: '', obs: '' };

function getState() {
  const saved = localStorage.getItem('myfit_session');
  if (saved) sessionState = JSON.parse(saved);
  const cs = localStorage.getItem('myfit_cardio_session');
  if (cs) cardioState = JSON.parse(cs);
}

function saveState() {
  localStorage.setItem('myfit_session', JSON.stringify(sessionState));
}

function initTreinoState(key) {
  if (!sessionState[key]) {
    sessionState[key] = {
      exercicios: TREINOS[key].exercicios.map(ex => ({
        concluido: false,
        notas: '',
        sets: Array.from({length: ex.series}, () => ({ peso: '', reps: '', done: false }))
      }))
    };
    saveState();
  }
}

function selectTreino(key) {
  currentTreino = key;
  document.querySelectorAll('.treino-sel-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn' + key).classList.add('active');
  if (key === 'Cardio') renderCardio();
  else renderTreino(key);
}

function renderTreino(key) {
  initTreinoState(key);
  const treino = TREINOS[key];
  const state = sessionState[key];

  let html = `
    <div class="workout-header">
      <div class="workout-tag">${key}</div>
      <div class="workout-info">
        <h2>${treino.emoji} ${treino.nome}</h2>
        <p>${treino.descricao}</p>
      </div>
    </div>
  `;

  treino.exercicios.forEach((ex, i) => {
    const exState = state.exercicios[i];
    const doneSets = exState.sets.filter(s => s.done).length;

    html += `
      <div class="exercise-card ${exState.concluido ? 'completed' : ''}" id="card-${key}-${i}">
        <div class="exercise-header" onclick="toggleExBody('${key}',${i})">
          <div class="ex-number">0${i+1}</div>
          <div class="ex-info">
            <div class="ex-name">${ex.nome}</div>
            <div class="ex-muscles">${ex.musculos}</div>
          </div>
          <div class="ex-meta">
            <strong>${ex.series}×${ex.reps}</strong>
            ${doneSets}/${ex.series} séries
          </div>
          <div class="ex-check">${exState.concluido ? '✓' : ''}</div>
        </div>
        <div class="exercise-body" id="body-${key}-${i}">
          <div class="sets-header">
            <div>Série</div><div>Peso (kg)</div><div>Reps</div><div>✓</div>
          </div>
          ${exState.sets.map((s, si) => `
            <div class="set-row">
              <div class="set-num">${si+1}</div>
              <input class="set-input" type="number" inputmode="decimal" placeholder="kg" value="${s.peso}"
                oninput="updateSet('${key}',${i},${si},'peso',this.value)">
              <input class="set-input" type="number" inputmode="numeric" placeholder="reps" value="${s.reps}"
                oninput="updateSet('${key}',${i},${si},'reps',this.value)">
              <button class="set-done-btn ${s.done ? 'done' : ''}" onclick="toggleSetDone('${key}',${i},${si})">✓</button>
            </div>
          `).join('')}
          <div class="notes-area">
            <textarea placeholder="Observações..." onchange="updateNota('${key}',${i},this.value)">${exState.notas}</textarea>
          </div>
          <button class="btn-complete-ex ${exState.concluido ? 'reopen' : ''}" onclick="toggleExerciseDone('${key}',${i})">
            ${exState.concluido ? '↩ Reabrir exercício' : '✓ Marcar como concluído'}
          </button>
        </div>
      </div>
    `;
  });

  html += `<button class="btn-save" onclick="salvarTreino('${key}')">💾 SALVAR TREINO</button>`;

  document.getElementById('treinoContent').innerHTML = html;
}

function renderCardio() {
  const html = `
    <div class="workout-header">
      <div class="workout-tag">🏃</div>
      <div class="workout-info">
        <h2>Cardio</h2>
        <p>Registre sua atividade</p>
      </div>
    </div>
    <div class="cardio-card">
      <h3>Atividade</h3>
      <div class="cardio-row">
        <span class="cardio-label">Tipo</span>
        <input class="cardio-input" type="text" placeholder="Ex: Esteira, Bike, Corrida..." value="${cardioState.tipo}"
          oninput="cardioState.tipo=this.value; saveCardioState()">
      </div>
      <div class="cardio-row">
        <span class="cardio-label">Duração</span>
        <input class="cardio-input" type="text" placeholder="Ex: 30 min, 5km..." value="${cardioState.duracao}"
          oninput="cardioState.duracao=this.value; saveCardioState()">
      </div>
      <div class="cardio-row">
        <span class="cardio-label">Observações</span>
        <input class="cardio-input" type="text" placeholder="Como foi? Intensidade..." value="${cardioState.obs}"
          oninput="cardioState.obs=this.value; saveCardioState()">
      </div>
    </div>
    <button class="btn-save" onclick="salvarCardio()">💾 SALVAR CARDIO</button>
  `;
  document.getElementById('treinoContent').innerHTML = html;
}

function saveCardioState() {
  localStorage.setItem('myfit_cardio_session', JSON.stringify(cardioState));
}

function salvarCardio() {
  const historico = JSON.parse(localStorage.getItem('myfit_historico') || '[]');
  const registro = {
    id: Date.now(),
    key: 'Cardio',
    nome: cardioState.tipo || 'Cardio',
    data: new Date().toISOString(),
    isCardio: true,
    duracao: cardioState.duracao,
    obs: cardioState.obs,
    exercicios: []
  };
  historico.unshift(registro);
  localStorage.setItem('myfit_historico', JSON.stringify(historico));
  cardioState = { tipo: '', duracao: '', obs: '' };
  localStorage.removeItem('myfit_cardio_session');
  showToast('Cardio salvo! 🏃');
  setTimeout(() => showPage('stats'), 1200);
}

function toggleExBody(key, i) {
  const body = document.getElementById(`body-${key}-${i}`);
  body.classList.toggle('open');
}

function updateSet(key, i, si, field, value) {
  sessionState[key].exercicios[i].sets[si][field] = value;
  saveState();
}

function toggleSetDone(key, i, si) {
  const s = sessionState[key].exercicios[i].sets[si];
  s.done = !s.done;
  saveState();
  renderTreino(key);
  setTimeout(() => {
    const body = document.getElementById(`body-${key}-${i}`);
    if (body) body.classList.add('open');
  }, 10);
}

function toggleExerciseDone(key, i) {
  sessionState[key].exercicios[i].concluido = !sessionState[key].exercicios[i].concluido;
  saveState();
  renderTreino(key);
}

function updateNota(key, i, value) {
  sessionState[key].exercicios[i].notas = value;
  saveState();
}

function salvarTreino(key) {
  const state = sessionState[key];
  const treino = TREINOS[key];
  const historico = JSON.parse(localStorage.getItem('myfit_historico') || '[]');

  const registro = {
    id: Date.now(),
    key,
    nome: treino.nome,
    data: new Date().toISOString(),
    exercicios: treino.exercicios.map((ex, i) => ({
      nome: ex.nome,
      sets: state.exercicios[i].sets,
      notas: state.exercicios[i].notas
    }))
  };

  historico.unshift(registro);
  localStorage.setItem('myfit_historico', JSON.stringify(historico));
  delete sessionState[key];
  saveState();
  showToast('Treino salvo! 💪');
  setTimeout(() => showPage('stats'), 1200);
}

function deletarTreino(id) {
  let historico = JSON.parse(localStorage.getItem('myfit_historico') || '[]');
  historico = historico.filter(r => r.id !== id);
  localStorage.setItem('myfit_historico', JSON.stringify(historico));
  if (document.getElementById('page-stats').classList.contains('active')) renderStats();
}

// CALENDAR
let calYear, calMonth;
function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

function renderCalendar() {
  const historico = JSON.parse(localStorage.getItem('myfit_historico') || '[]');
  const hoje = new Date();

  const trainedMap = {};
  historico.forEach(r => {
    const d = new Date(r.data);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (!trainedMap[key]) trainedMap[key] = [];
    trainedMap[key].push(r);
  });

  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const diasLabel = ['D','S','T','Q','Q','S','S'];
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

  let html = `
    <div class="calendar-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <div class="calendar-month-title">${meses[calMonth]} ${calYear}</div>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="calendar-grid">
      ${diasLabel.map(d => `<div class="cal-day-label">${d}</div>`).join('')}
      ${Array(firstDay).fill('<div class="cal-day empty"></div>').join('')}
  `;

  for (let day = 1; day <= daysInMonth; day++) {
    const dateKey = calYear + '-' + String(calMonth+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
    const registros = trainedMap[dateKey] || [];
    const isToday = hoje.getFullYear() === calYear && hoje.getMonth() === calMonth && hoje.getDate() === day;
    const isTrained = registros.length > 0;
    const isCardio = isTrained && registros.every(r => r.isCardio);
    const tag = isTrained ? registros.map(r => r.key).join('/') : '';
    const cls = isTrained ? (isCardio ? 'cardio-day' : 'trained') : (isToday ? 'today' : '');

    html += `<div class="cal-day ${cls}" ${isTrained ? `onclick="showCalDetail('${dateKey}')"` : ''}>
      ${day}
      ${isTrained ? `<div class="cal-tag">${tag}</div>` : ''}
    </div>`;
  }

  html += '</div>';
  document.getElementById('calendarCard').innerHTML = html;
}

function changeMonth(delta) {
  calMonth += delta;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function showCalDetail(dateKey) {
  const historico = JSON.parse(localStorage.getItem('myfit_historico') || '[]');
  const regs = historico.filter(r => {
    const d = new Date(r.data);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return k === dateKey;
  });

  const existing = document.getElementById('calDetailPanel');
  if (existing) {
    if (existing.dataset.key === dateKey) { existing.remove(); return; }
    existing.remove();
  }
  if (!regs.length) return;

  const [y,m,d] = dateKey.split('-');
  const meses = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  const dateStr = d + ' de ' + meses[parseInt(m)-1] + ' de ' + y;

  let html = '<div class="cal-detail"><div class="cal-detail-date">' + dateStr + '</div>';
  regs.forEach(r => {
    if (r.isCardio) {
      html += '<div class="cal-detail-treino"><div class="cal-detail-header"><div class="cal-detail-key">🏃</div><div class="cal-detail-nome">' + r.nome + '</div></div>';
      if (r.duracao) html += '<div class="cal-detail-ex"><span>Duração</span><span class="cal-detail-peso">' + r.duracao + '</span></div>';
      if (r.obs) html += '<div class="cal-detail-ex"><span>Obs</span><span class="cal-detail-peso">' + r.obs + '</span></div>';
      html += '</div>';
      return;
    }
    const totalPeso = r.exercicios.reduce((a, ex) => a + ex.sets.reduce((b, s) => b + (parseFloat(s.peso)||0), 0), 0);
    const doneSets = r.exercicios.reduce((a, ex) => a + ex.sets.filter(s => s.done).length, 0);
    html += '<div class="cal-detail-treino"><div class="cal-detail-header"><div class="cal-detail-key">' + r.key + '</div><div class="cal-detail-nome">' + r.nome + '</div></div>';
    r.exercicios.forEach(ex => {
      const pesos = ex.sets.filter(s => s.done && s.peso).map(s => s.peso + 'kg');
      const pesoStr = pesos.length ? [...new Set(pesos)].join(', ') : '';
      html += '<div class="cal-detail-ex"><span>' + ex.nome + '</span>' + (pesoStr ? '<span class="cal-detail-peso">' + pesoStr + '</span>' : '') + '</div>';
    });
    if (totalPeso > 0) html += '<div style="margin-top:8px;font-size:11px;color:var(--muted)">Volume: <strong style="color:var(--accent)">' + totalPeso.toFixed(0) + ' kg</strong> &nbsp;&#183;&nbsp; ' + doneSets + ' s\u00e9ries</div>';
    html += '</div>';
  });
  html += '</div>';

  const panel = document.createElement('div');
  panel.id = 'calDetailPanel';
  panel.dataset.key = dateKey;
  panel.innerHTML = html;
  document.getElementById('calendarCard').appendChild(panel);
}

function getStreak(historico) {
  if (!historico.length) return 0;
  const dates = [...new Set(historico.map(r => new Date(r.data).toDateString()))].sort((a,b) => new Date(b)-new Date(a));
  let streak = 0;
  let cur = new Date();
  for (let d of dates) {
    const dd = new Date(d);
    const diff = Math.round((cur - dd) / 86400000);
    if (diff <= 1) { streak++; cur = dd; } else break;
  }
  return streak;
}

function renderStats() {
  const historico = JSON.parse(localStorage.getItem('myfit_historico') || '[]');
  renderCalendar();

  const hoje = new Date();
  const startOfWeek = new Date(hoje);
  startOfWeek.setDate(hoje.getDate() - hoje.getDay());
  const totalTreinos = historico.length;
  const thisWeek = historico.filter(r => new Date(r.data) >= startOfWeek).length;
  const totalVolume = historico.filter(r => !r.isCardio).reduce((a, r) => a + r.exercicios.reduce((b, ex) => b + ex.sets.reduce((c, s) => c + (parseFloat(s.peso)||0), 0), 0), 0);

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-value">${totalTreinos}</div><div class="stat-label">Total de sessões</div></div>
    <div class="stat-card"><div class="stat-value">${thisWeek}</div><div class="stat-label">Essa semana</div></div>
    <div class="stat-card"><div class="stat-value">${totalVolume > 0 ? (totalVolume/1000).toFixed(1)+'t' : '0'}</div><div class="stat-label">Volume total</div></div>
    <div class="stat-card"><div class="stat-value">${getStreak(historico)}</div><div class="stat-label">Sequência 🔥</div></div>
  `;

  const tipos = { A: 0, B: 0, C: 0, D: 0, Cardio: 0 };
  historico.forEach(r => { if (tipos[r.key] !== undefined) tipos[r.key]++; });
  document.getElementById('tipoStats').innerHTML = Object.entries(tipos).map(([k, v]) => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div style="font-family:'Bebas Neue',Impact,sans-serif;font-size:18px;color:var(--accent);min-width:50px">${k === 'Cardio' ? '🏃' : k}</div>
      <div style="flex:1;background:var(--surface);border-radius:4px;height:8px;overflow:hidden">
        <div style="height:100%;background:var(--accent);width:${totalTreinos ? (v/totalTreinos*100) : 0}%;border-radius:4px;transition:width 0.5s"></div>
      </div>
      <div style="font-size:13px;color:var(--muted);min-width:20px">${v}x</div>
    </div>
  `).join('');
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tabs .tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const idx = ['treino','stats'].indexOf(page);
  document.querySelectorAll('.nav-tabs .tab-btn')[idx].classList.add('active');
  if (page === 'stats') renderStats();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// INIT
document.addEventListener('DOMContentLoaded', function() {
  getState();
  initCalendar();
  const hoje = new Date();
  document.getElementById('headerDate').textContent = hoje.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short' });
  selectTreino('A');
});
</script>
